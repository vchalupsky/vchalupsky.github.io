<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Blog</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <h1>Simple Blog</h1>
        <p class="tagline">A tiny static blog built with HTML, CSS & JavaScript</p>
      </div>
    </header>

    <main class="wrap">
      <section class="controls">
        <input id="search" placeholder="Search posts, tags, or text" aria-label="Search posts" />
      </section>

      <section id="posts" class="posts"></section>
    </main>

    <footer class="site-footer">
      <div class="wrap">Built with ❤️ — open <a href="README.md">README</a> for instructions.</div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
